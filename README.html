<h1 style="font-size:24px;margin:0 0 6px;color:#0f9d58;">치지직 플러그인</h1>
<p style="color:#666;margin:0 0 20px;">치지직을 좀 더 편하게 쓰기 위한 Chrome 확장</p>

<ol style="padding-left:22px;margin:0;">
  <li style="margin:8px 0;"><b>팔로잉 그룹화</b> — 채널 직접 묶기 / 게임별 자동 분류</li>
  <li style="margin:8px 0;"><b>방송 알림</b> — 골라둔 스트리머만 우상단 토스트</li>
  <li style="margin:8px 0;"><b>다시보기 북마크</b> — 라이브에서 찍어두고 다시보기에서 시점 점프</li>
  <li style="margin:8px 0;"><b>클립 다운로드</b> — 썸네일 호버 ⬇ 한 번에 mp4</li>
  <li style="margin:8px 0;"><b>다시보기 다운로드</b> — 화질 선택 후 .ts 저장 (VLC 재생)</li>
</ol>

<p style="margin-top:24px;color:#888;font-size:13px;">압축 풀고 <code style="background:#eef2f0;padding:2px 5px;border-radius:3px;color:#0f9d58;">chrome://extensions/</code> → 개발자 모드 → 압축해제된 확장 로드</p>
